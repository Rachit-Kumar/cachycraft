# Hyprlock configuration
# See https://wiki.hypr.land/Hypr-Ecosystem/hyprlock/

general {
    no_cursor = true
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3 # 0 disables blurring
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# TIME
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M")"
    color = rgba(255, 255, 255, 0.8)
    font_size = 120
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 250
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = rgba(255, 255, 255, 0.7)
    font_size = 24
    font_family = JetBrainsMono Nerd Font
    position = 0, 140
    halign = center
    valign = center
}

# USER
label {
    monitor =
    text = Hi there, $USER
    color = rgba(255, 255, 255, 0.7)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 280, 60
    outline_thickness = 3
    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(255, 255, 255, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font
    placeholder_text = <span foreground="##ffffffaa">Password...</span>
    hide_input = false
    position = 0, -80
    halign = center
    valign = center
    rounding = 15
    check_color = rgba(33ccffee)
    fail_color = rgba(ff3333ee)
}
