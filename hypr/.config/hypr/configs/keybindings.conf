
###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal # Open terminal
bind = $mainMod, C, killactive,              # Close the active window
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, fullscreen, 0             # Toggle fullscreen
bind = $mainMod, T, togglefloating,           # Toggle floating mode
bind = $mainMod, G, togglegroup,              # Toggle window group
bind = $mainMod SHIFT, P, pin,                # Pin floating window (always-on-top)
#bind = $mainMod, V, togglefloating,
bind = ALT, SPACE, exec, ~/.config/rofi/launchers/type-2/launcher.sh || pkill rofi
bind = $mainMod, R, exec, ~/.config/hypr/scripts/launch.sh
bind = $mainMod, W, exec, ~/.config/hypr/scripts/wallpaper-selector.sh
bind = $mainMod, X, exec, wlogout -b 3 -c 10 -r 10 -m 350
bind = ALT, F4, exec, wlogout -b 3 -c 10 -r 10 -m 350
bind = $mainMod, L, exec, hyprlock -c ~/.config/hypr/configs/hyprlock.conf
bind = $mainMod, V, exec, ~/.config/hypr/scripts/clipboard.sh
bind = $mainMod, slash, exec, ~/.config/hypr/scripts/cheatsheet.sh
bind = ALT, Tab, exec, snappy-switcher next 
bind = ALT SHIFT, Tab, exec, snappy-switcher prev

# Screenshots (Fn + F6 sends Super+Shift+S natively)
bind = SUPER SHIFT, S, exec, hyprshot -m region -o ~/Pictures/Screenshots --clipboard
#bind = , XF86Launch3, exec, hyprshot -m region -o ~/Pictures/Screenshots --clipboard

bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move active window to adjacent monitor
bind = $mainMod SHIFT, left, movewindow, mon:l
bind = $mainMod SHIFT, right, movewindow, mon:r
bind = $mainMod SHIFT, up, movewindow, mon:u
bind = $mainMod SHIFT, down, movewindow, mon:d

# Switch workspaces with mainMod + [0-9]qq
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace (scratchpad) - Moved to avoid Fn+F6 conflict
bind = ALT, S, togglespecialworkspace, magic
bind = ALT SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, ~/.config/hypr/scripts/volume-control.sh --up
bindel = ,XF86AudioLowerVolume, exec, ~/.config/hypr/scripts/volume-control.sh --down
bindel = ,XF86AudioMute, exec, ~/.config/hypr/scripts/volume-control.sh --mute
bindel = ,XF86AudioMicMute, exec, ~/.config/hypr/scripts/volume-control.sh --mic-mute
bindel = ,XF86MonBrightnessUp, exec, ~/.config/hypr/scripts/brightness-control.sh --up
bindel = ,XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness-control.sh --down

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86Launch4, exec, ~/.config/hypr/scripts/fan-profile.sh --toggle
